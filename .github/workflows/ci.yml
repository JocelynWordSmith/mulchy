name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dev dependencies
        run: uv sync --extra dev
      - name: Ruff lint
        run: uv run ruff check src/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dev + webcam dependencies
        run: uv sync --extra dev --extra webcam
      - name: Run unit and integration tests
        run: uv run pytest tests/unit tests/integration -v --cov=src/mulchy --cov-report=term-missing

  browser-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dev dependencies
        run: uv sync --extra dev
      - name: Install Playwright browsers and system deps
        run: |
          uv run playwright install chromium
          uv run playwright install-deps chromium
      - name: Run browser tests
        run: uv run pytest tests/browser -v
